server:
  port: 8001
  servlet:
    context-path: /

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: knowledge-parse-service
  profiles:
    active: dev
  cloud:
    nacos:
      # Nacos 服务注册与配置中心
      server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:nacos}
      discovery:
        namespace: ${NACOS_NAMESPACE:aigc-dev}
        group: AIGC_GROUP
        metadata:
          version: 1.0.0
          region: cn-hangzhou
      config:
        import-check:
          enabled: false
        namespace: ${NACOS_NAMESPACE:aigc-dev}
        group: AIGC_GROUP
        file-extension: yaml
        shared-configs:
          - data-id: aigc-common.yaml
            group: AIGC_GROUP
            refresh: true
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:127.0.0.1:8858}
      eager: true
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      lettuce:
        pool:
          max-active: 32
          max-idle: 16
          min-idle: 4
          max-wait: 3000ms

  ai:
    openai:
      # 知识解析服务仅使用 Embedding；默认切到阿里云百炼 OpenAI 兼容接口
      api-key: ${ALI_AI_API_KEY:your-api-key}
      base-url: ${ALI_AI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
      embedding:
        embeddings-path: ${ALI_AI_EMBEDDINGS_PATH:/embeddings}
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-v4}
    vectorstore:
      # 禁用 Spring AI starter 的自动配置，使用项目自定义 VectorStoreConfig
      milvus:
        enabled: false
      elasticsearch:
        enabled: false

# 文档解析与切片自定义配置
parse:
  chunk:
    size: 512
    overlap: 64
  embedding:
    batch-size: 8
    # 默认是否在上传时同步生成 Embedding（生产环境建议异步）
    default-enabled: false

# 向量库占位配置
vector:
  milvus:
    host: ${MILVUS_HOST:127.0.0.1}
    port: ${MILVUS_PORT:19530}
    database-name: aigc_knowledge
    collection-name: ${MILVUS_COLLECTION_NAME:knowledge_chunks_v4}
    dimension: ${MILVUS_DIMENSION:1024}
  elasticsearch:
    hosts: ${ES_HOSTS:http://127.0.0.1:9200}
    username: ${ES_USERNAME:}
    password: ${ES_PASSWORD:}
    index-prefix: ${ES_INDEX_PREFIX:aigc_v4}

# 自定义线程池：用于 CompletableFuture 并发解析/向量化
async:
  executor:
    parse:
      core-pool-size: 4
      max-pool-size: 16
      queue-capacity: 200
      keep-alive-seconds: 60
      thread-name-prefix: parse-async-
    vectorize:
      core-pool-size: 8
      max-pool-size: 32
      queue-capacity: 500
      keep-alive-seconds: 60
      thread-name-prefix: vectorize-async-

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.aigc.knowledge.parse: INFO
    io.milvus: WARN
    co.elastic.clients: WARN
